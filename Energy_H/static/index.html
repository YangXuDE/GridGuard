<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Energy_H — IEEE 123 Self-Healing Grid Agent</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2230; --border: #2d333b;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.45 "SF Mono", ui-monospace, Menlo, Consolas, monospace; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 18px;
           background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 17px; margin: 0; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .chip { padding: 3px 10px; border-radius: 12px; font-size: 12px;
          border: 1px solid var(--border); background: var(--panel2); }
  .chip.ok   { color: var(--ok);   border-color: var(--ok); }
  .chip.bad  { color: var(--bad);  border-color: var(--bad); }
  .chip.warn { color: var(--warn); border-color: var(--warn); }
  main { display: grid; grid-template-columns: minmax(440px, 1.3fr) minmax(360px, 1fr);
         gap: 12px; padding: 12px 18px; height: calc(100vh - 60px); }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
              color: var(--dim); margin: 0; padding: 9px 14px;
              border-bottom: 1px solid var(--border); }
  .panel .body { padding: 10px 14px; overflow: auto; flex: 1; min-height: 0; }
  #map { width: 100%; height: 100%; }
  .col { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  button { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  button.primary:hover { background: #388bfd; color: #fff; }
  button:disabled { opacity: .45; cursor: wait; }
  input, select { background: var(--bg); color: var(--text); border: 1px solid var(--border);
                  border-radius: 6px; padding: 5px 8px; font: inherit; width: 90px; }
  label { color: var(--dim); font-size: 12px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .log { font-size: 12.5px; white-space: pre-wrap; }
  .log .op   { color: #e3b341; margin: 8px 0 2px; }
  .log .act  { color: var(--accent); }
  .log .sys  { color: var(--dim); }
  .log .err  { color: var(--bad); }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  td, th { padding: 3px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  th { color: var(--dim); font-weight: normal; }
  .v-bad { color: var(--bad); } .v-warn { color: var(--warn); } .v-ok { color: var(--ok); }
  .legend { display:flex; gap:13px; font-size:11px; color:var(--dim); padding: 4px 14px 9px; flex-wrap:wrap; }
  .legend i { display:inline-block; width:18px; height:3px; margin-right:4px; vertical-align:middle; }
  #wx-table td, #wx-table th { padding: 2px 6px; }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; height: auto; }
                              .panel { min-height: 320px; } }
</style>
</head>
<body>
<header>
  <h1>⚡ Energy<span>_H</span> <span style="color:var(--dim);font-size:12px">self-healing agent · IEEE 123 feeder</span></h1>
  <div class="row">
    <label>load ×</label><input id="load-scale" type="number" step="0.05" value="1.30" style="width:64px">
    <label>weather</label>
    <select id="wx-profile" style="width:104px">
      <option value="heatwave">🔥 heatwave</option>
      <option value="clear">☀ clear</option>
      <option value="overcast">☁ overcast</option>
      <option value="storm">⛈ storm</option>
      <option value="none">— none</option>
    </select>
    <label>hour</label><input id="wx-hour" type="number" min="0" max="23" value="16" style="width:52px">
    <button class="primary" id="btn-new">New scenario</button>
  </div>
  <div class="row" style="margin-left:auto">
    <span class="chip" id="chip-wx">—</span>
    <span class="chip" id="chip-base">base: —</span>
    <span class="chip" id="chip-n1">N-1: —</span>
    <span class="chip" id="chip-cost">cost: €0</span>
  </div>
</header>

<main>
  <div class="panel">
    <h2>Feeder map <span id="map-hint" style="text-transform:none;letter-spacing:0"></span></h2>
    <div class="body" style="padding:0"><svg id="map" viewBox="0 0 100 100"></svg></div>
    <div class="legend">
      <span><i style="background:#3fb950"></i>&lt; 75 %</span>
      <span><i style="background:#d29922"></i>75–100 %</span>
      <span><i style="background:#f85149"></i>overload</span>
      <span><i style="background:#666;height:0;border-top:3px dashed #666"></i>open</span>
      <span style="color:#f85149">⚡ faulted</span>
      <span style="color:#58a6ff">🔧 maint</span>
      <span style="color:#d29922">⚠ derated</span>
      <span>★ substation</span><span>☀ PV</span><span>🌀 wind</span><span>🔋 BESS</span>
    </div>
  </div>

  <div class="col">
    <div class="panel" style="flex:0 0 auto">
      <h2>Operate</h2>
      <div class="body">
        <div class="row" style="margin-bottom:9px">
          <button id="btn-screen">Run N-1 screen</button>
          <button id="btn-fault">Trip worst line</button>
          <button id="btn-advance" title="step 1 h along the forecast">⏩ +1 h</button>
        </div>
        <div class="row">
          <button id="btn-baseline">Run LP baseline</button>
          <button id="btn-llm">Run Agent (DeepSeek)</button>
        </div>
        <div class="row" style="margin-top:9px">
          <select id="act-type" style="width:150px">
            <option value="discharge_battery">discharge_battery</option>
            <option value="charge_battery">charge_battery</option>
            <option value="curtail_renewable">curtail_renewable</option>
            <option value="curtail_load">curtail_load</option>
          </select>
          <span id="act-fields"></span>
          <button id="btn-apply">Apply</button>
        </div>
      </div>
    </div>

    <div class="panel" style="flex:0 0 auto">
      <h2>Weather forecast <span id="wx-hdr" style="text-transform:none;letter-spacing:0"></span></h2>
      <div class="body" style="padding:6px 10px;overflow-x:auto">
        <table id="wx-table" style="white-space:nowrap"></table>
        <div id="wx-assets" style="font-size:11.5px;margin-top:6px"></div>
      </div>
    </div>

    <div class="panel" style="flex:1 1 45%">
      <h2>Control-room log</h2>
      <div class="body log" id="log">Create a scenario to begin.</div>
    </div>

    <div class="panel" style="flex:1 1 35%">
      <h2>N-1 screen</h2>
      <div class="body" id="screen-out" style="font-size:12px;color:var(--dim)">not run yet</div>
    </div>
  </div>
</main>

<script>
let SID = null, STATE = null;
const $ = id => document.getElementById(id);
const logEl = $('log');
const WX_ICON = {clear:'☀', heatwave:'🔥', overcast:'☁', storm:'⛈',
                 'pre-storm':'🌥', clearing:'🌤'};

function log(cls, text) {
  const d = document.createElement('div');
  d.className = cls; d.textContent = text;
  logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

async function api(method, path, body) {
  const r = await fetch(path, {
    method, headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
}

/* ---------- chips ---------- */
function setChips() {
  if (!STATE) return;
  $('chip-base').textContent = 'base: ' + (STATE.base_secure ? 'secure' :
    (STATE.overloads.length + STATE.voltage_violations.length) + ' violation(s)');
  $('chip-base').className = 'chip ' + (STATE.base_secure ? 'ok' : 'bad');
  $('chip-cost').textContent = 'cost: €' + Number(STATE.cost).toLocaleString();
  const w = STATE.weather && STATE.weather.now;
  if (w) {
    $('chip-wx').textContent =
      `${String(w.hour).padStart(2,'0')}:00 ${WX_ICON[w.condition]||''} ${w.temp_c}°C · ` +
      `☀${STATE.solar_mw.toFixed(1)} 🌀${STATE.wind_mw.toFixed(1)} MW · €${w.balancing_price}`;
  }
}
function setN1Chip(secure) {
  $('chip-n1').textContent = 'N-1: ' + (secure === null ? '—' : secure ? 'secure' : 'INSECURE');
  $('chip-n1').className = 'chip ' + (secure === null ? '' : secure ? 'ok' : 'bad');
}

/* ---------- SVG feeder map ---------- */
function drawMap() {
  const t = STATE.topology, svg = $('map');
  const xs = t.buses.map(b => b.x), ys = t.buses.map(b => b.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs);
  const miny = Math.min(...ys), maxy = Math.max(...ys);
  const W = 960, H = 720, pad = 26;
  const sx = x => pad + (x - minx) / (maxx - minx || 1) * (W - 2 * pad);
  const sy = y => H - pad - (y - miny) / (maxy - miny || 1) * (H - 2 * pad);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const pos = {}; t.buses.forEach(b => pos[b.bus] = [sx(b.x), sy(b.y)]);
  const sgenAt = {}; t.sgens.forEach(g => (sgenAt[g.bus] = g));
  const stoAt = {}; t.storages.forEach(s => (stoAt[s.bus] = s));
  const loadAt = {}; t.loads.forEach(l => (loadAt[l.bus] = (loadAt[l.bus]||0) + l.p_mw));
  let s = '';
  for (const ln of t.lines) {
    if (!pos[ln.from_bus] || !pos[ln.to_bus]) continue;
    const [x1,y1] = pos[ln.from_bus], [x2,y2] = pos[ln.to_bus];
    let color = '#3fb950', width = 2, dash = '';
    if (!ln.in_service) {
      color = ln.faulted ? '#f85149' : ln.maintenance ? '#58a6ff' : '#666';
      dash = 'stroke-dasharray="6 5"'; width = 1.5;
    } else if (ln.loading_pct >= 100) { color = '#f85149'; width = 3.2; }
    else if (ln.loading_pct >= 75)  { color = '#d29922'; width = 2.6; }
    const scada = ln.p_mw != null ? ` · ${ln.p_mw} MW / ${ln.q_mvar} MVAR` : '';
    const hlth = ln.derate && ln.derate < 1
      ? ` · health ${Math.round(ln.health*100)}%, rating ×${ln.derate}` : '';
    s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}"
          stroke-width="${width}" ${dash} opacity="0.9">
          <title>${ln.name} (${ln.from_bus}→${ln.to_bus}) ${ln.in_service ? (ln.loading_pct ?? '?') + '%' + scada : ln.faulted ? 'FAULTED' : ln.maintenance ? 'MAINTENANCE' : 'open'}${hlth}</title></line>`;
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    if (ln.in_service && ln.loading_pct >= 100)
      s += `<text x="${mx}" y="${my-4}" fill="${color}" font-size="10" text-anchor="middle">${ln.loading_pct}%</text>`;
    if (!ln.in_service && ln.faulted)
      s += `<text x="${mx}" y="${my+4}" font-size="12" text-anchor="middle">⚡</text>`;
    if (!ln.in_service && ln.maintenance)
      s += `<text x="${mx}" y="${my+4}" font-size="11" text-anchor="middle">🔧</text>`;
    if (ln.in_service && ln.derate && ln.derate < 1)
      s += `<text x="${mx}" y="${my+4}" fill="#d29922" font-size="10" text-anchor="middle">⚠</text>`;
  }
  for (const b of t.buses) {
    if (!pos[b.bus]) continue;
    const [x,y] = pos[b.bus];
    const isSlack = t.slack_buses.includes(b.bus);
    const r = isSlack ? 6 : (loadAt[b.bus] ? 3.2 : 2.2);
    const fill = isSlack ? '#e3b341' : (loadAt[b.bus] ? '#58a6ff' : '#3a4254');
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#0d1117" stroke-width="1">
          <title>bus ${b.name}${isSlack ? ' (substation)' : ''}${loadAt[b.bus] ? ` · load ${(loadAt[b.bus]*1000).toFixed(0)} kW` : ''}</title></circle>`;
    if (isSlack) s += `<text x="${x}" y="${y-9}" fill="#e3b341" font-size="13" text-anchor="middle">★</text>`;
    const sg = sgenAt[b.bus];
    if (sg) {
      const icon = sg.type === 'WT' ? '🌀' : '☀';
      const lbl = sg.type === 'WT' ? 'wind farm' : sg.type === 'PV' ? 'utility PV' : 'rooftop PV';
      s += `<text x="${x-9}" y="${y-6}" font-size="12">${icon}<title>${lbl} ${sg.sgen}: ${(sg.p_mw*1000).toFixed(0)} / ${(sg.capacity_mw*1000).toFixed(0)} kW</title></text>`;
    }
    const st = stoAt[b.bus];
    if (st) {
      const col = st.soc_percent > 50 ? '#3fb950' : st.soc_percent > 20 ? '#d29922' : '#f85149';
      s += `<text x="${x+5}" y="${y-6}" font-size="12">🔋<title>BESS ${st.storage}: ${st.output_mw > 0 ? 'discharging '+(st.output_mw*1000).toFixed(0) : st.output_mw < 0 ? 'charging '+(-st.output_mw*1000).toFixed(0) : 'idle 0'} kW · SoC ${st.soc_percent}%</title></text>
            <text x="${x+19}" y="${y-6}" font-size="9" fill="${col}">${Math.round(st.soc_percent)}%</text>`;
    }
  }
  svg.innerHTML = s;
  $('map-hint').textContent = ` · ${(STATE.total_load_mw*1000).toFixed(0)} kW load · max ${STATE.max_loading_pct}%`;
}

/* ---------- weather strip ---------- */
function renderForecast() {
  const wx = STATE && STATE.weather;
  if (!wx) { $('wx-table').innerHTML = ''; $('wx-assets').innerHTML=''; return; }
  $('wx-hdr').textContent = ` · ${wx.profile}`;
  const cur = wx.hour;
  let h1='<tr><th>hr</th>', h2='<tr><th></th>', h3='<tr><th>°C</th>',
      h6='<tr><th>wind</th>', h7='<tr><th>🌀kW</th>', h4='<tr><th>☀kW</th>',
      h5='<tr><th>load×</th>', h8='<tr><th>€/MWh</th>';
  for (const f of wx.forecast) {
    const now = f.hour === cur;
    const st = now ? ' style="color:var(--accent);font-weight:bold"' : '';
    const cut = f.wind_factor === 0 && f.wind_ms >= 25;
    h1 += `<td${st}>${String(f.hour).padStart(2,'0')}${now?'▾':''}</td>`;
    h2 += `<td${st} title="${f.condition}, ${f.irradiance_wm2} W/m²">${WX_ICON[f.condition]||''}</td>`;
    h3 += `<td${st}>${Math.round(f.temp_c)}</td>`;
    h6 += `<td${st}>${cut?'<span class="v-bad">':''}${Math.round(f.wind_ms)}${cut?'✕</span>':''}</td>`;
    h7 += `<td${st}>${Math.round((f.wind_forecast_mw||0)*1000)}</td>`;
    h4 += `<td${st}>${Math.round((f.solar_forecast_mw||0)*1000)}</td>`;
    h5 += `<td${st} title="load ${Math.round((f.load_forecast_mw||0)*1000)} kW">${f.load_factor.toFixed(2)}</td>`;
    h8 += `<td${st} title="day-ahead €${f.day_ahead_price}">${Math.round(f.balancing_price)}</td>`;
  }
  $('wx-table').innerHTML = [h1,h2,h3,h6,h7,h4,h5,h8].map(r=>r+'</tr>').join('');
  const ah = STATE.asset_health;
  if (ah && !ah.error) {
    const deg = (ah.degraded_lines||[]).map(d =>
      `${d.name} ${Math.round(d.health*100)}%→×${d.derate}`).join(' · ');
    let m = '';
    if ((ah.maintenance_lines||[]).length) m = '🔧 out: ' + ah.maintenance_lines.map(x=>x.name).join(', ');
    else if ((ah.maintenance_scheduled||[]).length) m = '🔧 scheduled: ' + ah.maintenance_scheduled.map(x=>x.name).join(', ');
    $('wx-assets').innerHTML = `<span style="color:var(--warn)">⚠ ${deg||'no derated lines'}</span>` +
      (m ? ` · <span style="color:var(--accent)">${m}</span>` : '');
  }
}

function refresh(j) { STATE = j; setChips(); drawMap(); renderForecast(); }

/* ---------- scenario ---------- */
$('btn-new').onclick = async () => {
  busy(true);
  try {
    const j = await api('POST', '/api/scenario', {
      load_scale: parseFloat($('load-scale').value),
      weather: $('wx-profile').value, hour: parseInt($('wx-hour').value),
    });
    SID = j.sid; clearLog(); setN1Chip(null);
    $('screen-out').textContent = 'not run yet';
    refresh(j);
    const w = j.weather && j.weather.now;
    log('sys', `Scenario: IEEE 123, load ×${$('load-scale').value}, ${$('wx-profile').value}` +
        (w ? ` @ ${w.hour}:00, ${w.temp_c}°C, demand ×${w.load_factor}` : '') + '.');
    if (j.base_secure) log('sys', `Base secure. Max loading ${j.max_loading_pct}%.`);
    else log('err', `${j.overloads.length} overload(s), ${j.voltage_violations.length} voltage violation(s). Max ${j.max_loading_pct}%.`);
  } catch (e) { log('err', e.message); }
  busy(false);
};

/* ---------- N-1 screen ---------- */
$('btn-screen').onclick = async () => {
  if (!SID) return;
  busy(true); log('sys', 'Two-stage N-1 screen (DC all, AC dangerous)…');
  try {
    const j = await api('POST', `/api/screen/${SID}`);
    setN1Chip(j.secure);
    log(j.secure ? 'sys' : 'err',
        `Screened ${j.n_screened} (AC-solved ${j.n_ac_solved}): ${j.n_dangerous} dangerous, ${j.n_islanding} islanding.`);
    renderScreen(j);
  } catch (e) { log('err', e.message); }
  busy(false);
};

function renderScreen(j) {
  let h = '';
  if (j.dangerous.length) {
    h += `<table><tr><th>contingency</th><th>overloads</th><th>max</th></tr>`;
    for (const d of j.dangerous) h +=
      `<tr><td>${d.name}</td><td>${d.converged ? d.n_overloaded : '<span class="v-bad">diverged</span>'}</td>` +
      `<td class="v-bad">${d.converged ? d.max_loading_pct+'%' : '—'}</td></tr>`;
    h += '</table>';
  } else h = '<span class="v-ok">✓ no dangerous thermal N-1 contingency</span>';
  if (j.islanding.length) {
    h += `<div style="margin-top:8px;color:var(--dim)">Islanding outages (need restoration switching):</div>`;
    h += '<table>' + j.islanding.map(i =>
      `<tr><td>${i.name}</td><td>${Math.round(i.unserved_kw)} kW</td><td>${i.buses} buses</td></tr>`).join('') + '</table>';
  }
  $('screen-out').innerHTML = h;
}

/* ---------- trip / advance ---------- */
$('btn-fault').onclick = async () => {
  if (!SID) return;
  busy(true); log('sys', 'Tripping the worst dangerous N-1 line…');
  try {
    const j = await api('POST', `/api/fault/${SID}`, {});
    refresh(j); setN1Chip(null);
    log('err', `⚡ Line ${j.faulted_line} tripped. Now ${j.overloads.length} overload(s), max ${j.max_loading_pct}%.`);
  } catch (e) { log('err', e.message); }
  busy(false);
};

$('btn-advance').onclick = async () => {
  if (!SID) return;
  busy(true);
  try {
    const j = await api('POST', `/api/advance/${SID}`);
    if (!j.ok) { log('err', j.error); }
    else {
      refresh(j); setN1Chip(null);
      const w = j.weather_now;
      log('sys', `⏩ ${String(w.hour).padStart(2,'0')}:00 — ${w.condition}, ${w.temp_c}°C, ` +
          `wind ${w.wind_ms} m/s, demand ×${w.load_factor}. BESS integrated 1 h.`);
    }
  } catch (e) { log('err', e.message); }
  busy(false);
};

/* ---------- manual action ---------- */
const FIELDS = {
  discharge_battery: `<label>storage_</label><input id="f-id" type="number" value="0" style="width:48px">
                      <label>MW</label><input id="f-mw" type="number" value="0.3" step="0.05" style="width:62px">`,
  charge_battery:    `<label>storage_</label><input id="f-id" type="number" value="0" style="width:48px">
                      <label>MW</label><input id="f-mw" type="number" value="0.3" step="0.05" style="width:62px">`,
  curtail_renewable: `<label>sgen_</label><input id="f-id" type="number" value="0" style="width:48px">
                      <label>MW</label><input id="f-mw" type="number" value="0.2" step="0.05" style="width:62px">`,
  curtail_load:      `<label>load</label><input id="f-id" type="number" value="0" style="width:48px">
                      <label>MW</label><input id="f-mw" type="number" value="0.05" step="0.01" style="width:62px">`,
};
function renderFields() { $('act-fields').innerHTML = FIELDS[$('act-type').value]; }
$('act-type').onchange = renderFields; renderFields();

$('btn-apply').onclick = async () => {
  if (!SID) return;
  const t = $('act-type').value, id = +$('f-id').value, mw = +$('f-mw').value;
  const tid = (t === 'curtail_load') ? id
            : (t === 'curtail_renewable') ? 'sgen_' + id : 'storage_' + id;
  busy(true);
  try {
    const j = await api('POST', `/api/apply/${SID}`, {actions: [{target_id: tid, action_type: t, amount_mw: mw}]});
    if (!j.ok) log('err', j.error || 'rejected');
    else { refresh(j); setN1Chip(null);
      log('act', `Applied ${t} ${tid} ${mw} MW (€${Number(j.applied_cost).toLocaleString()}).`); }
  } catch (e) { log('err', e.message); }
  busy(false);
};

/* ---------- baseline ---------- */
$('btn-baseline').onclick = async () => {
  if (!SID) return;
  busy(true); log('sys', 'LP baseline running (SCOPF-lite: BESS + spill + shed)…');
  try {
    const j = await api('POST', `/api/baseline/${SID}`);
    refresh(j);
    const r = j.result;
    log('sys', `Baseline: base ${r.base_secure ? '✓ secure' : '✗ insecure'}, €${Number(r.cost).toLocaleString()}, ${r.n_actions} actions.`);
    const cnt = {}; for (const a of r.actions) cnt[a.type] = (cnt[a.type]||0)+1;
    log('act', '  ' + Object.entries(cnt).map(([k,v])=>`${k}×${v}`).join(', '));
  } catch (e) { log('err', e.message); }
  busy(false);
};

/* ---------- LLM agent ---------- */
$('btn-llm').onclick = () => {
  if (!SID) return;
  busy(true); log('sys', 'DeepSeek operator starting… (reasoning streams below)');
  const es = new EventSource(`/api/llm/${SID}`);
  es.onmessage = async ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'sys') log('sys', m.message);
    else if (m.type === 'narration') log('op', '🧑‍✈️ ' + m.text);
    else if (m.type === 'action') log('act', '   ⚙ ' + m.text);
    else if (m.type === 'error') { log('err', m.message); es.close(); refreshState(); busy(false); }
    else if (m.type === 'done') {
      es.close();
      log('sys', `Agent done: base ${m.result.base_secure ? '✓ secure' : '✗ insecure'}, ` +
                 `max ${m.result.max_loading_pct}%, €${Number(m.result.cost).toLocaleString()}.`);
      setN1Chip(null); refreshState(); busy(false);
    }
  };
  es.onerror = () => { es.close(); refreshState(); busy(false); };
};
async function refreshState() { try { refresh(await api('GET', `/api/state/${SID}`)); } catch {} }

function busy(b) {
  for (const id of ['btn-new','btn-screen','btn-fault','btn-advance','btn-baseline','btn-llm','btn-apply'])
    $(id).disabled = b;
}

/* boot */
$('btn-new').click();
</script>
</body>
</html>
